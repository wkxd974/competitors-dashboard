<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球餐饮可比上市公司看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d2e;
    --card-hover: #222640;
    --border: #2a2e45;
    --text: #e4e6f0;
    --text-dim: #8b8fa3;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
  }
  .header {
    text-align: center; padding: 48px 20px 24px;
    background: linear-gradient(180deg, #1a1040 0%, var(--bg) 100%);
  }
  .header h1 {
    font-size: 2rem; font-weight: 700;
    background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
  }
  .header p { color: var(--text-dim); font-size: 0.95rem; }
  .container { max-width: 1440px; margin: 0 auto; padding: 0 24px 60px; }

  /* Filter pills */
  .filter-section { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin: 20px 0 8px; }
  .filter-section .label { font-size: 0.8rem; color: var(--text-dim); margin-right: 4px; align-self: center; }
  .cat-pill {
    padding: 5px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); cursor: pointer;
    font-size: 0.82rem; transition: all .2s;
  }
  .cat-pill:hover { border-color: var(--accent); color: var(--text); }
  .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  /* Tabs */
  .tabs {
    display: flex; justify-content: center; gap: 4px; margin: 20px 0 28px;
    background: var(--card); border-radius: 12px; padding: 4px; width: fit-content;
    margin-left: auto; margin-right: auto;
  }
  .tab {
    padding: 10px 24px; border-radius: 10px; cursor: pointer;
    font-size: 0.9rem; color: var(--text-dim); transition: all .2s;
    border: none; background: transparent;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent); color: #fff; font-weight: 600; }

  /* Sort bar */
  .sort-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .sort-bar label { color: var(--text-dim); font-size: 0.85rem; }
  .sort-bar select {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; cursor: pointer;
  }

  /* KPI */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .kpi-card { background: var(--card); border-radius: 14px; padding: 18px; border: 1px solid var(--border); }
  .kpi-card .label { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 4px; }
  .kpi-card .value { font-size: 1.5rem; font-weight: 700; }

  /* Company Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .company-card {
    background: var(--card); border-radius: 14px; padding: 20px;
    border: 1px solid var(--border); transition: all .25s; cursor: default;
  }
  .company-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,.15); }
  .company-card .name { font-size: 1.1rem; font-weight: 700; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .company-card .tag {
    font-size: 0.62rem; padding: 2px 7px; border-radius: 10px;
    background: rgba(99,102,241,.15); color: var(--accent2);
  }
  .region-tag {
    font-size: 0.62rem; padding: 2px 7px; border-radius: 10px;
  }
  .region-CN { background: rgba(239,68,68,.12); color: #fca5a5; }
  .region-US { background: rgba(59,130,246,.12); color: #93c5fd; }
  .region-JP { background: rgba(234,179,8,.12); color: #fde047; }
  .region-CA { background: rgba(34,197,94,.12); color: #86efac; }
  .company-card .metrics { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .metric .mlabel { font-size: 0.72rem; color: var(--text-dim); }
  .metric .mval { font-size: 0.98rem; font-weight: 600; }
  .metric .mchange { font-size: 0.72rem; margin-left: 3px; }
  .up { color: var(--green); } .down { color: var(--red); } .na { color: var(--text-dim); }
  .sssg-row { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .sssg-row .mlabel { font-size: 0.72rem; color: var(--text-dim); }
  .sssg-row .sssg-text { font-size: 0.8rem; color: var(--text); margin-top: 2px; }

  /* Charts */
  .charts-section { margin-top: 20px; }
  .charts-section h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
  .chart-box { background: var(--card); border-radius: 14px; padding: 20px; border: 1px solid var(--border); }
  .chart-box h3 { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 12px; }
  @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .header h1 { font-size: 1.4rem; } .tabs { flex-wrap: wrap; } }

  /* Table */
  .table-wrap { overflow-x: auto; margin-bottom: 40px; border-radius: 14px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th, td { padding: 9px 12px; text-align: right; white-space: nowrap; }
  th { background: #1e2138; color: var(--text-dim); font-weight: 600; position: sticky; top: 0; }
  td { border-top: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--card); z-index: 1; }
  tr:hover td { background: var(--card-hover); }
  tr:hover td:first-child { background: var(--card-hover); }

  /* View Toggle */
  .view-toggle { display: flex; gap: 4px; background: var(--card); border-radius: 10px; padding: 3px; }
  .view-btn { padding: 6px 16px; border-radius: 8px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.82rem; transition: all .2s; }
  .view-btn.active { background: var(--accent); color: #fff; }
  #cardView, #tableView { display: none; }
  #cardView.show, #tableView.show { display: block; }
  .hidden { display: none !important; }
</style>
</head>

<div class="header">
  <h1>全球餐饮可比上市公司看板</h1>

</div>

<div class="container">

  <div class="filter-section" id="regionBar"></div>

  <div class="filter-section" id="categoryBar"></div>

  <div class="sort-bar">

    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="card">卡片</button>
      <button class="view-btn" data-view="table">表格</button>
    </div>
  </div>
  <div id="cardView" class="show"><div class="grid" id="companyGrid"></div></div>
  <div id="tableView"><div class="table-wrap"><table id="dataTable"></table></div></div>
  <div class="charts-section">

      <div class="chart-box"><h3>净利率 (%)</h3><canvas id="chartNet"></canvas></div>
    </div>
  </div>
</div>
