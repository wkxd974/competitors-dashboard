<style>

    --accent2: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
  }
  .header {
    text-align: center; padding: 48px 20px 24px;
    background: linear-gradient(180deg, #1a1040 0%, var(--bg) 100%);
  }
  .header h1 {
    font-size: 2rem; font-weight: 700;
    background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
  }
  .header p { color: var(--text-dim); font-size: 0.95rem; }
  .container { max-width: 1440px; margin: 0 auto; padding: 0 24px 60px; }

  /* Filter pills */
  .filter-section { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin: 20px 0 8px; }
  .filter-section .label { font-size: 0.8rem; color: var(--text-dim); margin-right: 4px; align-self: center; }
  .cat-pill {
    padding: 5px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); cursor: pointer;
    font-size: 0.82rem; transition: all .2s;
  }
  .cat-pill:hover { border-color: var(--accent); color: var(--text); }
  .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  /* Tabs */
  .tabs {
    display: flex; justify-content: center; gap: 4px; margin: 20px 0 28px;
    background: var(--card); border-radius: 12px; padding: 4px; width: fit-content;
    margin-left: auto; margin-right: auto;
  }
  .tab {
    padding: 10px 24px; border-radius: 10px; cursor: pointer;
    font-size: 0.9rem; color: var(--text-dim); transition: all .2s;
    border: none; background: transparent;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent); color: #fff; font-weight: 600; }

  /* Sort bar */
  .sort-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .sort-bar label { color: var(--text-dim); font-size: 0.85rem; }
  .sort-bar select {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; cursor: pointer;
  }

  /* KPI */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .kpi-card { background: var(--card); border-radius: 14px; padding: 18px; border: 1px solid var(--border); }
  .kpi-card .label { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 4px; }
  .kpi-card .value { font-size: 1.5rem; font-weight: 700; }

  /* Company Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .company-card {
    background: var(--card); border-radius: 14px; padding: 20px;
    border: 1px solid var(--border); transition: all .25s; cursor: default;
  }
  .company-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,.15); }
  .company-card .name { font-size: 1.1rem; font-weight: 700; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .company-card .tag {
    font-size: 0.62rem; padding: 2px 7px; border-radius: 10px;
    background: rgba(99,102,241,.15); color: var(--accent2);
  }
  .region-tag {
    font-size: 0.62rem; padding: 2px 7px; border-radius: 10px;
  }
  .region-CN { background: rgba(239,68,68,.12); color: #fca5a5; }
  .region-US { background: rgba(59,130,246,.12); color: #93c5fd; }
  .region-JP { background: rgba(234,179,8,.12); color: #fde047; }
  .region-CA { background: rgba(34,197,94,.12); color: #86efac; }
  .company-card .metrics { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .metric .mlabel { font-size: 0.72rem; color: var(--text-dim); }
  .metric .mval { font-size: 0.98rem; font-weight: 600; }
  .metric .mchange { font-size: 0.72rem; margin-left: 3px; }
  .up { color: var(--green); } .down { color: var(--red); } .na { color: var(--text-dim); }
  .sssg-row { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .sssg-row .mlabel { font-size: 0.72rem; color: var(--text-dim); }
  .sssg-row .sssg-text { font-size: 0.8rem; color: var(--text); margin-top: 2px; }

  /* Charts */
  .charts-section { margin-top: 20px; }
  .charts-section h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
  .chart-box { background: var(--card); border-radius: 14px; padding: 20px; border: 1px solid var(--border); }
  .chart-box h3 { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 12px; }
  @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .header h1 { font-size: 1.4rem; } .tabs { flex-wrap: wrap; } }

  /* Table */
  .table-wrap { overflow-x: auto; margin-bottom: 40px; border-radius: 14px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th, td { padding: 9px 12px; text-align: right; white-space: nowrap; }
  th { background: #1e2138; color: var(--text-dim); font-weight: 600; position: sticky; top: 0; }
  td { border-top: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--card); z-index: 1; }
  tr:hover td { background: var(--card-hover); }
  tr:hover td:first-child { background: var(--card-hover); }

  /* View Toggle */
  .view-toggle { display: flex; gap: 4px; background: var(--card); border-radius: 10px; padding: 3px; }
  .view-btn { padding: 6px 16px; border-radius: 8px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.82rem; transition: all .2s; }
  .view-btn.active { background: var(--accent); color: #fff; }
  #cardView, #tableView { display: none; }
  #cardView.show, #tableView.show { display: block; }
  .hidden { display: none !important; }
</style>

    { name:'比格披萨', cat:'其他', region:'CN', currency:'CNY', revenue:13.89, revGrowth:21.1, profit:0.52, profGrowth:null, gross:50.9, net:3.7, sssg:null, stores:342, turnover:null, avgSpend:null },
    { name:'老乡鸡', cat:'综合餐饮', region:'CN', currency:'CNY', revenue:62.88, revGrowth:11.3, profit:4.09, profGrowth:null, gross:22.8, net:6.5, sssg:null, stores:null, turnover:null, avgSpend:null },
    { name:'袁记水饺', cat:'综合餐饮', region:'CN', currency:'CNY', revenue:25.61, revGrowth:26.4, profit:1.42, profGrowth:null, gross:23.0, net:5.5, sssg:null, stores:null, turnover:null, avgSpend:null },
    { name:'幻师commune', cat:'综合餐饮', region:'CN', currency:'CNY', revenue:10.74, revGrowth:27.1, profit:0.54, profGrowth:null, gross:32.2, net:5.0, sssg:'1.9%', stores:null, turnover:null, avgSpend:null },
    { name:'巴奴', cat:'火锅', region:'CN', currency:'CNY', revenue:null, revGrowth:null, profit:null, profGrowth:null, gross:null, net:null, sssg:'4.3%', stores:144, turnover:null, avgSpend:null }
  ]
};

const periodLabels = { 'H1':'2025年H1（半年报）', 'FY':'2025全年' };

let currentPeriod = 'H1';
let currentRegion = 'ALL';
let currentCategory = '全部';
let currentSort = 'revenue_desc';
let charts = {};

function init() {
  renderRegionBar();
  renderCategoryBar();
  renderPeriodTabs();
  document.getElementById('sortSelect').addEventListener('change', e => { currentSort = e.target.value; render(); });
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('cardView').classList.toggle('show', btn.dataset.view === 'card');
      document.getElementById('tableView').classList.toggle('show', btn.dataset.view === 'table');
    });
  });
  render();
}

function renderRegionBar() {
  const bar = document.getElementById('regionBar');
  bar.innerHTML = '<span class="label">地区：</span>';
  Object.entries(regionNames).forEach(([key, label]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (key === currentRegion ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { currentRegion = key; bar.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); };
    bar.appendChild(btn);
  });
}

function renderCategoryBar() {
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = '<span class="label">类别：</span>';
  catNames.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (cat === currentCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { currentCategory = cat; bar.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); };
    bar.appendChild(btn);
  });
}

function renderPeriodTabs() {
  const tabs = document.getElementById('periodTabs');
  tabs.innerHTML = '';
  Object.entries(periodLabels).forEach(([key, label]) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (key === currentPeriod ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { currentPeriod = key; document.querySelectorAll('.tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); };
    tabs.appendChild(btn);
  });
}

function getFiltered() {
  let items = [...(data[currentPeriod] || [])];
  if (currentRegion !== 'ALL') items = items.filter(d => d.region === currentRegion);
  if (currentCategory !== '全部') items = items.filter(d => d.cat === currentCategory);
  const [field, dir] = currentSort.split('_');
  const key = field === 'revenue' ? 'revenue' : field === 'profit' ? 'profit' : 'net';
  items.sort((a, b) => dir === 'desc' ? (b[key]||0) - (a[key]||0) : (a[key]||0) - (b[key]||0));
  return items;
}

function fmtPct(v) { return v == null ? '—' : v.toFixed(1) + '%'; }
function fmtNum(v) { return v == null ? '—' : v.toFixed(2); }
function fmtGrowth(v) {
  if (v == null) return '<span class="na">—</span>';
  const s = v.toFixed(1) + '%';
  if (v > 0) return '<span class="up">+' + s + '</span>';
  if (v < 0) return '<span class="down">' + s + '</span>';
  return '<span class="na">' + s + '</span>';
}
function currUnit(c) {
  return currencyLabels[c] || '亿元';
}

function render() {
  const items = getFiltered();
  renderKPIs(items);
  renderCards(items);
  renderTable(items);
  renderCharts(items);
}

function renderKPIs(items) {
  const row = document.getElementById('kpiRow');
  const cnItems = items.filter(d => d.currency === 'CNY');
  const totalRev = cnItems.reduce((s, d) => s + (d.revenue || 0), 0);
  const totalProfit = cnItems.reduce((s, d) => s + (d.profit || 0), 0);
  const avgGross = items.filter(d => d.gross != null);
  const avgNet = items.filter(d => d.net != null);
  const gv = avgGross.length ? avgGross.reduce((s,d) => s + d.gross, 0) / avgGross.length : 0;
  const nv = avgNet.length ? avgNet.reduce((s,d) => s + d.net, 0) / avgNet.length : 0;
  row.innerHTML =
    '<div class="kpi-card"><div class="label">公司数量</div><div class="value">' + items.length + '</div></div>' +
    '<div class="kpi-card"><div class="label">中国公司总营收（亿元）</div><div class="value">' + totalRev.toFixed(1) + '</div></div>' +
    '<div class="kpi-card"><div class="label">中国公司总利润（亿元）</div><div class="value" style="color:' + (totalProfit>=0?'var(--green)':'var(--red)') + '">' + totalProfit.toFixed(1) + '</div></div>' +
    '<div class="kpi-card"><div class="label">平均毛利率</div><div class="value">' + gv.toFixed(1) + '%</div></div>' +
    '<div class="kpi-card"><div class="label">平均净利率</div><div class="value">' + nv.toFixed(1) + '%</div></div>';
}

function renderCards(items) {
  const grid = document.getElementById('companyGrid');
  grid.innerHTML = items.map(d => {
    const u = d.currency === 'CNY' ? '亿元' : d.currency === 'USD' ? '百万$' : '亿¥';
    return '<div class="company-card">' +
      '<div class="name">' + d.name +
        ' <span class="tag">' + d.cat + '</span>' +
        ' <span class="region-tag region-' + d.region + '">' + regionNames[d.region] + '</span>' +
      '</div>' +
      '<div class="metrics">' +
        '<div class="metric"><div class="mlabel">营收（' + u + '）</div><div class="mval">' + fmtNum(d.revenue) + ' ' + fmtGrowth(d.revGrowth) + '</div></div>' +
        '<div class="metric"><div class="mlabel">净利润（' + u + '）</div><div class="mval" style="color:' + (d.profit!=null&&d.profit<0?'var(--red)':'var(--text)') + '">' + fmtNum(d.profit) + ' ' + fmtGrowth(d.profGrowth) + '</div></div>' +
        '<div class="metric"><div class="mlabel">毛利率</div><div class="mval">' + fmtPct(d.gross) + '</div></div>' +
        '<div class="metric"><div class="mlabel">净利率</div><div class="mval" style="color:' + (d.net!=null&&d.net<0?'var(--red)':'var(--text)') + '">' + fmtPct(d.net) + '</div></div>' +
        '<div class="metric"><div class="mlabel">门店</div><div class="mval">' + (d.stores != null ? d.stores.toLocaleString() : '—') + '</div></div>' +
        '<div class="metric"><div class="mlabel">翻台/人均</div><div class="mval">' + (d.turnover != null ? d.turnover + '次' : '—') + (d.avgSpend != null ? '/' + d.avgSpend + '元' : '') + '</div></div>' +
      '</div>' +
      (d.sssg ? '<div class="sssg-row"><div class="mlabel">同店增长</div><div class="sssg-text">' + d.sssg + '</div></div>' : '') +
    '</div>';
  }).join('');
}

function renderTable(items) {
  const table = document.getElementById('dataTable');
  table.innerHTML =
    '<thead><tr><th>公司</th><th>地区</th><th>类别</th><th>币种</th><th>营收</th><th>营收增速</th><th>净利润</th><th>利润增速</th><th>毛利率</th><th>净利率</th><th>门店</th><th>翻台率</th><th>人均</th><th>同店增长</th></tr></thead>' +
    '<tbody>' + items.map(d =>
      '<tr>' +
        '<td style="font-weight:600">' + d.name + '</td>' +
        '<td>' + regionNames[d.region] + '</td>' +
        '<td>' + d.cat + '</td>' +
        '<td>' + d.currency + '</td>' +
        '<td>' + fmtNum(d.revenue) + '</td>' +
        '<td>' + fmtGrowth(d.revGrowth) + '</td>' +
        '<td style="color:' + (d.profit!=null&&d.profit<0?'var(--red)':'var(--text)') + '">' + fmtNum(d.profit) + '</td>' +
        '<td>' + fmtGrowth(d.profGrowth) + '</td>' +
        '<td>' + fmtPct(d.gross) + '</td>' +
        '<td style="color:' + (d.net!=null&&d.net<0?'var(--red)':'var(--text)') + '">' + fmtPct(d.net) + '</td>' +
        '<td>' + (d.stores != null ? d.stores.toLocaleString() : '—') + '</td>' +
        '<td>' + (d.turnover != null ? d.turnover : '—') + '</td>' +
        '<td>' + (d.avgSpend != null ? d.avgSpend : '—') + '</td>' +
        '<td style="font-size:0.78rem;text-align:left">' + (d.sssg || '—') + '</td>' +
      '</tr>'
    ).join('') + '</tbody>';
}

function renderCharts(items) {
  const colors = ['#6366f1','#818cf8','#a78bfa','#c084fc','#e879f9','#f472b6','#fb7185',
    '#f59e0b','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#eab308','#f97316','#84cc16','#64748b',
    '#a3e635','#fbbf24','#38bdf8','#fb923c','#f87171','#34d399','#a78bfa','#818cf8'];
  // Only chart items with data, limit to top 25 for readability
  const chartItems = items.filter(d => d.revenue != null || d.profit != null).slice(0, 25);
  const labels = chartItems.map(d => d.name);
  const bgColors = chartItems.map((_, i) => colors[i % colors.length]);

  const opts = (unit) => ({
    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.x != null ? ctx.parsed.x.toFixed(2) + (unit||'') : '' } } },
    scales: {
      x: { grid: { color: '#2a2e45' }, ticks: { color: '#8b8fa3', font: { size: 11 } } },
      y: { grid: { display: false }, ticks: { color: '#e4e6f0', font: { size: 11 } } }
    }
  });

  const h = Math.max(300, chartItems.length * 32);
  document.querySelectorAll('.chart-box canvas').forEach(c => { c.parentElement.style.height = h + 'px'; });
  ['chartRevenue','chartProfit','chartGross','chartNet'].forEach(id => { if (charts[id]) charts[id].destroy(); });

  charts.chartRevenue = new Chart(document.getElementById('chartRevenue'), {
    type:'bar', data:{ labels, datasets:[{ data:chartItems.map(d=>d.revenue), backgroundColor:bgColors, borderRadius:4 }] }, options:opts()
  });
  charts.chartProfit = new Chart(document.getElementById('chartProfit'), {
    type:'bar', data:{ labels, datasets:[{ data:chartItems.map(d=>d.profit), backgroundColor:chartItems.map((d,i)=>d.profit<0?'#ef4444':bgColors[i]), borderRadius:4 }] }, options:opts()
  });
  charts.chartGross = new Chart(document.getElementById('chartGross'), {
    type:'bar', data:{ labels, datasets:[{ data:chartItems.map(d=>d.gross!=null?d.gross:0), backgroundColor:bgColors, borderRadius:4 }] }, options:opts('%')
  });
  charts.chartNet = new Chart(document.getElementById('chartNet'), {
    type:'bar', data:{ labels, datasets:[{ data:chartItems.map(d=>d.net!=null?d.net:0), backgroundColor:chartItems.map((d,i)=>d.net<0?'#ef4444':bgColors[i]), borderRadius:4 }] }, options:opts('%')
  });
}

init();
</script>
</body>
</html>
