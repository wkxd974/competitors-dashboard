<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球餐饮可比上市公司看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117; --card: #1a1d2e; --card-hover: #222640; --border: #2a2e45;
  --text: #e4e6f0; --text-dim: #8b8fa3; --accent: #6366f1; --accent2: #818cf8;
  --green: #22c55e; --red: #ef4444; --orange: #f59e0b; --cyan: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
a { color:var(--accent2); text-decoration:none; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* Layout */
.app { display:flex; height:100vh; }
.sidebar { width:260px; min-width:260px; background:var(--card); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { padding:20px 16px 12px; border-bottom:1px solid var(--border); }
.sidebar-header h1 { font-size:1.1rem; font-weight:700; background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sidebar-header p { font-size:0.72rem; color:var(--text-dim); margin-top:2px; }
.sidebar-nav { flex:1; overflow-y:auto; padding:8px 0; }
.nav-group { margin-bottom:4px; }
.nav-group-title { padding:8px 16px 4px; font-size:0.7rem; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; display:flex; align-items:center; gap:6px; }
.nav-group-title .flag { font-size:0.85rem; }
.nav-item { padding:7px 16px 7px 28px; font-size:0.82rem; color:var(--text-dim); cursor:pointer; transition:all .15s; border-left:3px solid transparent; }
.nav-item:hover { background:var(--card-hover); color:var(--text); }
.nav-item.active { background:rgba(99,102,241,.12); color:var(--accent2); border-left-color:var(--accent); font-weight:600; }
.nav-item .cat-tag { font-size:0.62rem; padding:1px 5px; border-radius:8px; background:rgba(99,102,241,.1); color:var(--accent2); margin-left:4px; }
.nav-summary { padding:7px 16px 7px 16px; font-size:0.82rem; color:var(--orange); cursor:pointer; transition:all .15s; border-left:3px solid transparent; font-weight:600; }
.nav-summary:hover { background:var(--card-hover); }
.nav-summary.active { background:rgba(245,158,11,.1); border-left-color:var(--orange); }

/* Main content */
.main { flex:1; overflow-y:auto; padding:0; }
.main-header { padding:20px 28px 0; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.main-title { font-size:1.4rem; font-weight:700; }
.main-subtitle { font-size:0.8rem; color:var(--text-dim); }

/* Period filter */
.period-filter { display:flex; gap:4px; padding:12px 28px; flex-wrap:wrap; }
.period-btn { padding:5px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:0.78rem; transition:all .2s; }
.period-btn:hover { border-color:var(--accent); color:var(--text); }
.period-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }

/* KPI cards */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; padding:12px 28px; }
.kpi-card { background:var(--card); border-radius:12px; padding:14px; border:1px solid var(--border); }
.kpi-card .kpi-label { font-size:0.72rem; color:var(--text-dim); }
.kpi-card .kpi-value { font-size:1.3rem; font-weight:700; margin-top:2px; }
.kpi-card .kpi-change { font-size:0.72rem; margin-top:2px; }
.up { color:var(--green); } .down { color:var(--red); } .na { color:var(--text-dim); }

/* Data table */
.data-section { padding:12px 28px 40px; }
.data-section h2 { font-size:1rem; font-weight:600; margin-bottom:10px; color:var(--text-dim); }
.table-wrap { overflow-x:auto; border-radius:12px; border:1px solid var(--border); max-height:65vh; overflow-y:auto; }
table { width:100%; border-collapse:collapse; font-size:0.78rem; }
th,td { padding:7px 10px; text-align:right; white-space:nowrap; }
th { background:#1e2138; color:var(--text-dim); font-weight:600; position:sticky; top:0; z-index:2; }
td { border-top:1px solid var(--border); }
th:first-child,td:first-child { text-align:left; position:sticky; left:0; z-index:1; min-width:180px; max-width:280px; white-space:normal; }
th:first-child { z-index:3; background:#1e2138; }
td:first-child { background:var(--card); }
tr:hover td { background:var(--card-hover); }
tr:hover td:first-child { background:var(--card-hover); }
tr.section-row td { font-weight:700; color:var(--accent2); background:rgba(99,102,241,.06); }
tr.section-row td:first-child { background:rgba(99,102,241,.06); }
tr.indent-2 td:first-child { padding-left:24px; }
tr.indent-3 td:first-child { padding-left:40px; }
tr.indent-4 td:first-child { padding-left:56px; }

/* Charts */
.charts-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:0 28px 20px; }
.chart-box { background:var(--card); border-radius:12px; padding:16px; border:1px solid var(--border); }
.chart-box h3 { font-size:0.85rem; color:var(--text-dim); margin-bottom:10px; }

/* Country summary */
.summary-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; padding:0 28px 28px; }
.summary-card { background:var(--card); border-radius:12px; padding:16px; border:1px solid var(--border); cursor:pointer; transition:all .2s; }
.summary-card:hover { border-color:var(--accent); transform:translateY(-1px); }
.summary-card .sc-name { font-size:1rem; font-weight:700; margin-bottom:2px; }
.summary-card .sc-cat { font-size:0.7rem; color:var(--accent2); }
.summary-card .sc-metrics { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
.summary-card .sc-m {}
.summary-card .sc-ml { font-size:0.68rem; color:var(--text-dim); }
.summary-card .sc-mv { font-size:0.9rem; font-weight:600; }

/* Loading */
.loading { display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:12px; }
.loading .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

@media (max-width:900px) {
  .sidebar { width:200px; min-width:200px; }
  .charts-row { grid-template-columns:1fr; }
}
@media (max-width:600px) {
  .app { flex-direction:column; }
  .sidebar { width:100%; min-width:100%; height:auto; max-height:40vh; }
  .charts-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color:var(--text-dim);font-size:0.9rem;">加载数据中...</div>
  </div>
</div>

<script>
const DATA_URL = 'https://utidjtbvgwxsnhjczoju.supabase.co/storage/v1/object/public/public-data/brands_data.json';
const COUNTRY_NAMES = { CN:'中国', US:'美国', JP:'日本', CA:'加拿大' };
const COUNTRY_FLAGS = { CN:'🇨🇳', US:'🇺🇸', JP:'🇯🇵', CA:'🇨🇦' };
const COUNTRY_ORDER = ['CN','US','JP','CA'];

let allBrands = [];
let currentView = null;

function classifyPeriod(p) {
  if (/^\d{4}$/.test(p)) return 'FY';
  if (/^FY\d{4}$/i.test(p)) return 'FY';
  if (/fiscal/i.test(p)) return 'FY';
  if (/累计.*Q1/i.test(p) || /Q1/i.test(p)) return 'Q1';
  if (/累计.*Q2/i.test(p) || /Q2/i.test(p)) return 'Q2';
  if (/累计.*Q3/i.test(p) || /Q3/i.test(p)) return 'Q3';
  if (/累计.*Q4/i.test(p) || /Q4/i.test(p)) return 'Q4';
  if (/H1/i.test(p)) return 'H1';
  if (/H2/i.test(p)) return 'H2';
  return 'FY';
}

function filterPeriods(periods, filter) {
  if (filter === 'ALL') return periods;
  return periods.filter(p => classifyPeriod(p) === filter);
}

function formatNum(v) {
  if (v === null || v === undefined || v === '') return '-';
  if (typeof v === 'string') {
    if (v.includes('%')) return v;
    const n = parseFloat(v);
    if (isNaN(n)) return v;
    return n.toLocaleString('en-US', {maximumFractionDigits:2});
  }
  if (typeof v === 'number') {
    return v.toLocaleString('en-US', {maximumFractionDigits:2});
  }
  return String(v);
}

function buildApp() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>全球餐饮看板</h1>
        <p>可比上市公司经营数据</p>
      </div>
      <div class="sidebar-nav" id="sidebarNav"></div>
    </div>
    <div class="main" id="mainContent"></div>
  `;
  buildSidebar();
  showCountrySummary('CN');
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  for (const country of COUNTRY_ORDER) {
    const brands = allBrands.filter(b => b.country === country);
    if (brands.length === 0) continue;
    html += '<div class="nav-group">';
    html += '<div class="nav-group-title"><span class="flag">'+COUNTRY_FLAGS[country]+'</span> '+COUNTRY_NAMES[country]+'('+brands.length+')</div>';
    html += '<div class="nav-summary" data-country="'+country+'" onclick="showCountrySummary(\''+country+'\')">📊 '+COUNTRY_NAMES[country]+'汇总</div>';
    for (const b of brands) {
      const idx = allBrands.indexOf(b);
      html += '<div class="nav-item" data-brand="'+idx+'" onclick="showBrand('+idx+')">'+b.brand_name+'<span class="cat-tag">'+b.category+'</span></div>';
    }
    html += '</div>';
  }
  nav.innerHTML = html;
}

function setActiveNav(selector) {
  document.querySelectorAll('.nav-item,.nav-summary').forEach(function(el){ el.classList.remove('active'); });
  var el = document.querySelector(selector);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
}

// ========== BRAND DETAIL ==========
function showBrand(idx) {
  currentView = {type:'brand', index:idx};
  setActiveNav('.nav-item[data-brand="'+idx+'"]');
  var brand = allBrands[idx];
  var main = document.getElementById('mainContent');

  var periodTypes = {};
  brand.periods.forEach(function(p){ periodTypes[classifyPeriod(p)] = true; });
  var filters = ['ALL','FY','Q1','Q2','Q3','Q4','H1','H2'].filter(function(f){ return f==='ALL' || periodTypes[f]; });

  main.innerHTML =
    '<div class="main-header"><div>' +
    '<div class="main-title">'+COUNTRY_FLAGS[brand.country]+' '+brand.brand_name+'</div>' +
    '<div class="main-subtitle">'+COUNTRY_NAMES[brand.country]+' · '+brand.category+' · '+brand.periods.length+'个报告期</div>' +
    '</div></div>' +
    '<div class="period-filter" id="periodFilter">' +
    filters.map(function(f){ return '<button class="period-btn'+(f==='ALL'?' active':'')+'" data-filter="'+f+'" onclick="applyBrandFilter('+idx+',\''+f+'\',this)">'+( f==='ALL'?'全部':f)+'</button>'; }).join('') +
    '</div>' +
    '<div id="brandKPI"></div>' +
    '<div id="brandCharts" class="charts-row"></div>' +
    '<div class="data-section"><h2>详细数据</h2><div class="table-wrap" id="brandTable"></div></div>';

  applyBrandFilter(idx, 'ALL', document.querySelector('.period-btn'));
}

function applyBrandFilter(idx, filter, btn) {
  document.querySelectorAll('#periodFilter .period-btn').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');

  var brand = allBrands[idx];
  var periods = filterPeriods(brand.periods, filter);
  renderBrandKPI(brand, periods);
  renderBrandTable(brand, periods);
  renderBrandCharts(brand, periods);
}

function findMetric(brand, labels, period) {
  for (var li=0; li<labels.length; li++) {
    for (var ri=0; ri<brand.data_rows.length; ri++) {
      var r = brand.data_rows[ri];
      if (r.l && r.l.indexOf(labels[li]) >= 0 && !r.s && r.v[period] !== undefined && r.v[period] !== null && r.v[period] !== '') return r.v[period];
    }
  }
  return null;
}

var REVENUE_LABELS = ['营业收入','总收入','营收','Revenue','Total revenue','Net Revenue','Total Revenue','Revenues','收入合计','总营收'];
var PROFIT_LABELS = ['净利润','归母净利润','Net income','Net Income','净利','Operating income','利润'];
var STORE_LABELS = ['门店总数','总计','Total','total','Store count','门店数','餐厅数量'];
var GROSS_LABELS = ['毛利率','Gross margin','Gross Margin','毛利润率'];
var NET_LABELS = ['净利率','Net margin','Net Margin','净利润率'];

function renderBrandKPI(brand, periods) {
  var container = document.getElementById('brandKPI');
  if (!periods.length) { container.innerHTML = '<div class="kpi-row"><div class="kpi-card"><div class="kpi-label">该筛选条件下无数据</div></div></div>'; return; }

  var latestP = periods[0], prevP = periods[1] || null;
  var rev = findMetric(brand, REVENUE_LABELS, latestP);
  var prof = findMetric(brand, PROFIT_LABELS, latestP);
  var stores = findMetric(brand, STORE_LABELS, latestP);
  var net = findMetric(brand, NET_LABELS, latestP);

  var revGrowth = null;
  if (rev !== null && prevP) {
    var prevRev = findMetric(brand, REVENUE_LABELS, prevP);
    if (prevRev && prevRev !== 0) revGrowth = ((rev - prevRev)/Math.abs(prevRev)*100).toFixed(1);
  }

  container.innerHTML = '<div class="kpi-row">' +
    '<div class="kpi-card"><div class="kpi-label">最新报告期</div><div class="kpi-value" style="color:var(--cyan)">'+latestP+'</div></div>' +
    '<div class="kpi-card"><div class="kpi-label">营收</div><div class="kpi-value">'+(rev!==null?formatNum(rev):'-')+'</div>' +
    (revGrowth!==null?'<div class="kpi-change '+(parseFloat(revGrowth)>=0?'up':'down')+'">'+(parseFloat(revGrowth)>=0?'▲':'▼')+' '+Math.abs(revGrowth)+'%</div>':'') + '</div>' +
    '<div class="kpi-card"><div class="kpi-label">净利润</div><div class="kpi-value">'+(prof!==null?formatNum(prof):'-')+'</div></div>' +
    '<div class="kpi-card"><div class="kpi-label">门店数</div><div class="kpi-value">'+(stores!==null?formatNum(stores):'-')+'</div></div>' +
    '<div class="kpi-card"><div class="kpi-label">净利率</div><div class="kpi-value">'+(net!==null?(typeof net==='string'?net:net+'%'):'-')+'</div></div>' +
    '</div>';
}

function renderBrandTable(brand, periods) {
  var container = document.getElementById('brandTable');
  if (!periods.length) { container.innerHTML = '<p style="padding:20px;color:var(--text-dim)">该筛选条件下无数据</p>'; return; }

  var html = '<table><thead><tr><th>指标</th>';
  periods.forEach(function(p){ html += '<th>'+p+'</th>'; });
  html += '</tr></thead><tbody>';

  brand.data_rows.forEach(function(row) {
    var isSection = row.s;
    var indent = row.i || 0;

    if (!isSection) {
      var hasValues = periods.some(function(p){ return row.v[p] !== undefined && row.v[p] !== null && row.v[p] !== ''; });
      if (!hasValues) return;
    }

    var cls = '';
    if (isSection) cls += ' section-row';
    if (indent >= 2) cls += ' indent-'+Math.min(indent,4);

    html += '<tr class="'+cls+'"><td>'+row.l+'</td>';
    if (isSection) {
      html += '<td colspan="'+periods.length+'"></td>';
    } else {
      periods.forEach(function(p){
        html += '<td>'+formatNum(row.v[p])+'</td>';
      });
    }
    html += '</tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

var chartInstances = [];
function destroyCharts() { chartInstances.forEach(function(c){ c.destroy(); }); chartInstances = []; }

function renderBrandCharts(brand, periods) {
  destroyCharts();
  var container = document.getElementById('brandCharts');
  if (periods.length < 2) { container.innerHTML = ''; return; }

  var fyPeriods = periods.filter(function(p){ return /^\d{4}$/.test(p) || /^FY\d{4}$/i.test(p); }).slice().reverse();
  var chartPeriods = fyPeriods.length >= 2 ? fyPeriods : periods.slice().reverse().slice(0,8);

  function getTimeSeries(labels) {
    for (var li=0;li<labels.length;li++) {
      for (var ri=0;ri<brand.data_rows.length;ri++) {
        var r = brand.data_rows[ri];
        if (r.l && r.l.indexOf(labels[li])>=0 && !r.s) {
          var vals = chartPeriods.map(function(p){ var v=r.v[p]; return (v!==undefined&&v!==null&&v!==''&&typeof v==='number')?v:null; });
          if (vals.some(function(v){return v!==null;})) return vals;
        }
      }
    }
    return null;
  }

  var revVals = getTimeSeries(REVENUE_LABELS);
  var profVals = getTimeSeries(PROFIT_LABELS);
  if (!revVals && !profVals) { container.innerHTML = ''; return; }

  var chartHtml = '';
  if (revVals) chartHtml += '<div class="chart-box"><h3>营收趋势</h3><canvas id="revChart"></canvas></div>';
  if (profVals) chartHtml += '<div class="chart-box"><h3>利润趋势</h3><canvas id="profChart"></canvas></div>';
  container.innerHTML = chartHtml;

  var chartOpts = {
    responsive:true,
    plugins:{legend:{display:false}},
    scales:{
      x:{ticks:{color:'#8b8fa3',font:{size:10}},grid:{color:'#2a2e45'}},
      y:{ticks:{color:'#8b8fa3',font:{size:10}},grid:{color:'#2a2e45'}}
    }
  };

  if (revVals) {
    chartInstances.push(new Chart(document.getElementById('revChart'),{
      type:'bar',data:{labels:chartPeriods,datasets:[{data:revVals,backgroundColor:'rgba(99,102,241,.6)',borderColor:'#6366f1',borderWidth:1,borderRadius:4}]},options:chartOpts
    }));
  }
  if (profVals) {
    chartInstances.push(new Chart(document.getElementById('profChart'),{
      type:'line',data:{labels:chartPeriods,datasets:[{data:profVals,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.1)',fill:true,tension:.3,pointRadius:4}]},options:chartOpts
    }));
  }
}

// ========== COUNTRY SUMMARY ==========
function showCountrySummary(country) {
  currentView = {type:'summary', country:country};
  setActiveNav('.nav-summary[data-country="'+country+'"]');
  var brands = allBrands.filter(function(b){ return b.country === country; });
  var main = document.getElementById('mainContent');

  main.innerHTML =
    '<div class="main-header"><div>' +
    '<div class="main-title">'+COUNTRY_FLAGS[country]+' '+COUNTRY_NAMES[country]+'餐饮公司汇总</div>' +
    '<div class="main-subtitle">'+brands.length+'家公司</div></div></div>' +
    '<div class="period-filter" id="summaryFilter">' +
    ['ALL','FY','Q1','Q2','Q3','Q4','H1'].map(function(f){
      return '<button class="period-btn'+(f==='ALL'?' active':'')+'" onclick="applySummaryFilter(\''+country+'\',\''+f+'\',this)">'+(f==='ALL'?'全部':f)+'</button>';
    }).join('') +
    '</div><div id="summaryContent"></div>';

  applySummaryFilter(country, 'ALL', document.querySelector('#summaryFilter .period-btn'));
}

function applySummaryFilter(country, filter, btn) {
  document.querySelectorAll('#summaryFilter .period-btn').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderSummaryContent(country, filter);
}

function renderSummaryContent(country, filter) {
  var brands = allBrands.filter(function(b){ return b.country === country; });
  var container = document.getElementById('summaryContent');
  destroyCharts();

  var brandData = brands.map(function(b){
    var periods = filterPeriods(b.periods, filter);
    var latestP = periods[0] || null;
    var prevP = periods[1] || null;
    var rev=null, prof=null, stores=null, gross=null, net=null, revGrowth=null;
    if (latestP) {
      rev = findMetric(b, REVENUE_LABELS, latestP);
      prof = findMetric(b, PROFIT_LABELS, latestP);
      stores = findMetric(b, STORE_LABELS, latestP);
      gross = findMetric(b, GROSS_LABELS, latestP);
      net = findMetric(b, NET_LABELS, latestP);
    }
    if (rev !== null && prevP) {
      var prevRev = findMetric(b, REVENUE_LABELS, prevP);
      if (prevRev && prevRev !== 0) revGrowth = ((rev-prevRev)/Math.abs(prevRev)*100).toFixed(1);
    }
    return {brand:b, latestP:latestP, rev:rev, prof:prof, stores:stores, gross:gross, net:net, revGrowth:revGrowth, idx:allBrands.indexOf(b), periodCount:periods.length};
  });

  // Cards
  var html = '<div class="summary-grid">';
  brandData.forEach(function(d){
    html += '<div class="summary-card" onclick="showBrand('+d.idx+')">' +
      '<div class="sc-name">'+d.brand.brand_name+'</div>' +
      '<div class="sc-cat">'+d.brand.category+(d.latestP?' · '+d.latestP:'')+'</div>' +
      '<div class="sc-metrics">' +
      '<div class="sc-m"><div class="sc-ml">营收</div><div class="sc-mv">'+(d.rev!==null?formatNum(d.rev):'-')+'</div>' +
      (d.revGrowth!==null?'<div style="font-size:0.68rem" class="'+(parseFloat(d.revGrowth)>=0?'up':'down')+'">'+(parseFloat(d.revGrowth)>=0?'▲':'▼')+Math.abs(d.revGrowth)+'%</div>':'') + '</div>' +
      '<div class="sc-m"><div class="sc-ml">净利润</div><div class="sc-mv">'+(d.prof!==null?formatNum(d.prof):'-')+'</div></div>' +
      '<div class="sc-m"><div class="sc-ml">门店数</div><div class="sc-mv">'+(d.stores!==null?formatNum(d.stores):'-')+'</div></div>' +
      '<div class="sc-m"><div class="sc-ml">毛利率</div><div class="sc-mv">'+(d.gross!==null?(typeof d.gross==='string'?d.gross:d.gross+'%'):'-')+'</div></div>' +
      '<div class="sc-m"><div class="sc-ml">净利率</div><div class="sc-mv">'+(d.net!==null?(typeof d.net==='string'?d.net:d.net+'%'):'-')+'</div></div>' +
      '<div class="sc-m"><div class="sc-ml">报告期数</div><div class="sc-mv">'+d.periodCount+'</div></div>' +
      '</div></div>';
  });
  html += '</div>';

  // Comparison table
  html += '<div class="data-section"><h2>横向对比</h2><div class="table-wrap"><table>' +
    '<thead><tr><th>品牌</th><th>品类</th><th>最新期</th><th>营收</th><th>营收增长</th><th>净利润</th><th>门店数</th><th>毛利率</th><th>净利率</th></tr></thead><tbody>';
  brandData.forEach(function(d){
    html += '<tr style="cursor:pointer" onclick="showBrand('+d.idx+')">' +
      '<td>'+d.brand.brand_name+'</td><td>'+d.brand.category+'</td><td>'+(d.latestP||'-')+'</td>' +
      '<td>'+(d.rev!==null?formatNum(d.rev):'-')+'</td>' +
      '<td class="'+(d.revGrowth!==null?(parseFloat(d.revGrowth)>=0?'up':'down'):'na')+'">'+(d.revGrowth!==null?d.revGrowth+'%':'-')+'</td>' +
      '<td>'+(d.prof!==null?formatNum(d.prof):'-')+'</td>' +
      '<td>'+(d.stores!==null?formatNum(d.stores):'-')+'</td>' +
      '<td>'+(d.gross!==null?(typeof d.gross==='string'?d.gross:d.gross+'%'):'-')+'</td>' +
      '<td>'+(d.net!==null?(typeof d.net==='string'?d.net:d.net+'%'):'-')+'</td>' +
      '</tr>';
  });
  html += '</tbody></table></div></div>';

  // Charts
  var withRev = brandData.filter(function(d){ return d.rev!==null && typeof d.rev==='number'; });
  if (withRev.length > 0) {
    html += '<div class="charts-row">' +
      '<div class="chart-box"><h3>营收对比</h3><canvas id="summaryRevChart"></canvas></div>' +
      '<div class="chart-box"><h3>净利率对比</h3><canvas id="summaryMarginChart"></canvas></div></div>';
  }

  container.innerHTML = html;

  if (withRev.length > 0) {
    var sorted = withRev.slice().sort(function(a,b){ return (b.rev||0)-(a.rev||0); });
    chartInstances.push(new Chart(document.getElementById('summaryRevChart'),{
      type:'bar',data:{
        labels:sorted.map(function(d){return d.brand.brand_name;}),
        datasets:[{data:sorted.map(function(d){return d.rev;}),backgroundColor:'rgba(99,102,241,.6)',borderRadius:4}]
      },options:{
        responsive:true,indexAxis:'y',
        plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'#8b8fa3'},grid:{color:'#2a2e45'}},y:{ticks:{color:'#8b8fa3',font:{size:10}},grid:{display:false}}}
      }
    }));

    var withMargin = brandData.filter(function(d){ return d.net!==null && typeof d.net==='number'; });
    if (withMargin.length > 0) {
      var msorted = withMargin.slice().sort(function(a,b){ return (b.net||0)-(a.net||0); });
      chartInstances.push(new Chart(document.getElementById('summaryMarginChart'),{
        type:'bar',data:{
          labels:msorted.map(function(d){return d.brand.brand_name;}),
          datasets:[{data:msorted.map(function(d){return d.net;}),backgroundColor:msorted.map(function(d){return (d.net||0)>=0?'rgba(34,197,94,.6)':'rgba(239,68,68,.6)';}),borderRadius:4}]
        },options:{
          responsive:true,indexAxis:'y',
          plugins:{legend:{display:false}},
          scales:{x:{ticks:{color:'#8b8fa3',callback:function(v){return v+'%';}},grid:{color:'#2a2e45'}},y:{ticks:{color:'#8b8fa3',font:{size:10}},grid:{display:false}}}
        }
      }));
    }
  }
}

// ========== INIT ==========
async function init() {
  try {
    var resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    allBrands = await resp.json();
    buildApp();
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="loading"><div style="color:var(--red)">Loading failed: '+e.message+'</div><div style="color:var(--text-dim);font-size:0.8rem">Please check network connection</div></div>';
  }
}
init();
</script>
</body>
</html>
